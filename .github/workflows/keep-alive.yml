name: Keep scheduled workflows alive

# GitHub disables scheduled workflows after 60 days of repo inactivity.
# This weekly ping prevents that from happening to update-db.yml.
on:
  schedule:
    - cron: '0 0 * * 0'  # Sundays at midnight UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: echo "keep-alive"
