name: Monthly GeoIP Database Update

on:
  schedule:
    - cron: '0 3 1 * *'   # 3am UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-geoip:
    name: Update GeoLite2-City Database
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Run update script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 30m
          script: |
            ~/bin/update-geoip.sh \
              "${{ secrets.MAXMIND_ACCOUNT_ID }}" \
              "${{ secrets.MAXMIND_LICENSE_KEY }}"

      - name: Smoke test — production still returns HTTP 200
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Host: ip2geo.org" \
            "http://${{ secrets.DEPLOY_HOST }}")
          if [ "$STATUS" != "200" ]; then
            echo "Post-update smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Functional test — 8.8.8.8 still resolves to US
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Host: ip2geo.org" \
            "http://${{ secrets.DEPLOY_HOST }}" \
            --data-urlencode "ip_list=8.8.8.8" \
            -d "submit=1")
          if echo "$RESPONSE" | grep -qiE "United States|>US<"; then
            echo "Functional test passed"
          else
            echo "Functional test failed: 8.8.8.8 did not resolve to US after update"
            exit 1
          fi

      - name: Checkout repo (for Spamhaus diff step)
        uses: actions/checkout@v5.0.1

      - name: Spamhaus ASN-DROP diff — open draft PR if gaps found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Close any stale candidate PRs and delete their branches from prior runs
          STALE_BRANCHES=$(gh api repos/febrile42/ip2geo/git/refs/heads \
            --jq '.[].ref | select(startswith("refs/heads/asn-classification-update-"))' \
            | sed 's|refs/heads/||')
          for STALE in $STALE_BRANCHES; do
            echo "Cleaning up stale branch: $STALE"
            gh pr list --head "$STALE" --json number --jq '.[].number' \
              | xargs -r -I{} gh pr close {} --comment "Superseded by next monthly run." --delete-branch || true
            git push origin --delete "$STALE" 2>/dev/null || true
          done

          # Fetch Spamhaus ASN-DROP list (NDJSON format — one JSON object per line)
          SPAMHAUS_ASNS=$(curl -sf https://www.spamhaus.org/drop/asndrop.json \
            | jq -r '"AS" + (.asn | tostring)' \
            | sort -u)

          # Extract ASN keys already in our classification array
          KNOWN_ASNS=$(grep -oP "'AS\d+'" asn_classification.php \
            | tr -d "'" \
            | sort -u)

          # Find ASNs in Spamhaus but missing from our array
          MISSING=$(comm -23 \
            <(echo "$SPAMHAUS_ASNS") \
            <(echo "$KNOWN_ASNS"))

          if [ -z "$MISSING" ]; then
            echo "Spamhaus diff: no gaps found. Classification array is current."
            exit 0
          fi

          echo "Spamhaus diff: found $(echo "$MISSING" | wc -l | tr -d ' ') ASNs not in classification array."

          # Format as PHP array candidate lines for human review
          MONTH=$(date +"%B %Y")
          BRANCH="asn-classification-update-$(date +%Y%m)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Append candidate lines to a review file (not to asn_classification.php directly)
          REVIEW_FILE="asn_classification_candidates.txt"
          {
            echo "# Spamhaus ASN-DROP additions — $MONTH"
            echo "# Review and move appropriate entries into asn_classification.php"
            echo "# NEVER auto-merged. Human review required."
            echo ""
            while IFS= read -r asn; do
              echo "    '$asn' => 'scanning',  // Spamhaus ASN-DROP — verify and classify"
            done <<< "$MISSING"
          } > "$REVIEW_FILE"

          git add -f "$REVIEW_FILE"
          if git diff --cached --quiet; then
            echo "Spamhaus diff: candidate file unchanged since last PR — no new action needed."
            exit 0
          fi
          git commit -m "chore: ASN classification candidates from Spamhaus ASN-DROP ($MONTH)"
          git push origin "$BRANCH"

          PR_BODY_FILE=$(mktemp)
          printf '%s\n' \
            '## Spamhaus ASN-DROP diff' \
            '' \
            'These ASNs appear in the [Spamhaus ASN-DROP list](https://www.spamhaus.org/drop/asndrop.json)' \
            'but are not in `asn_classification.php`.' \
            '' \
            'Review `asn_classification_candidates.txt` and move confirmed entries into' \
            '`$known_asns` in `asn_classification.php` with the appropriate category.' \
            '' \
            '**Never auto-merge this PR.** Human review required before classification changes ship.' \
            > "$PR_BODY_FILE"

          gh pr create \
            --title "ASN classification updates — $MONTH" \
            --body-file "$PR_BODY_FILE" \
            --draft \
            --base develop \
            --head "$BRANCH"

          rm -f "$PR_BODY_FILE"

      - name: Prune community stats older than 52 weeks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            PROD_PATH="/var/www/ip2geo"
            DB_HOST=$(php -r "require '$PROD_PATH/config.php'; echo \$db_host;")
            DB_USER=$(php -r "require '$PROD_PATH/config.php'; echo \$db_user;")
            DB_PASS=$(php -r "require '$PROD_PATH/config.php'; echo \$db_pass;")
            DB_NAME=$(php -r "require '$PROD_PATH/config.php'; echo \$db_name;")
            MYCNF=$(mktemp)
            chmod 600 "$MYCNF"
            printf '[client]\nhost=%s\nuser=%s\npassword=%s\ndatabase=%s\n' \
              "$DB_HOST" "$DB_USER" "$DB_PASS" "$DB_NAME" > "$MYCNF"
            mysql --defaults-extra-file="$MYCNF" <<'SQL'
            DELETE FROM community_cidr_stats WHERE week_start < DATE_SUB(CURDATE(), INTERVAL 52 WEEK);
            DELETE FROM community_ip_stats WHERE week_start < DATE_SUB(CURDATE(), INTERVAL 52 WEEK);
            SQL
            rm -f "$MYCNF"
