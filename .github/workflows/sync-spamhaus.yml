name: Spamhaus ASN-DROP Sync

# Regenerates the auto-sync block in asn_classification.php from the current
# Spamhaus ASN-DROP list and pushes to develop. Logically independent of the
# monthly GeoIP database update — kept as its own workflow so it can be
# dispatched on demand without re-running the GeoIP fetch + staging DB sync.

on:
  schedule:
    - cron: '0 3 1 * *'   # 3am UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-spamhaus:
    name: Regenerate auto-sync block on develop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate Spamhaus auto-sync block
        id: regen
        run: |
          set -euo pipefail

          CLASSIFICATION_FILE="asn_classification.php"
          BEGIN_MARKER="// --- BEGIN AUTO-SYNC SPAMHAUS ASN-DROP (do not hand-edit) ---"
          END_MARKER="// --- END AUTO-SYNC SPAMHAUS ASN-DROP ---"

          # Spamhaus ASN-DROP — current bad-actor AS list (NDJSON, one object per line).
          # The first record is a `{"type":"metadata",...}` header with no .asn — filter it
          # out so we don't materialize an "ASnull" entry into the classification array.
          SPAMHAUS_ASNS=$(curl -sf https://www.spamhaus.org/drop/asndrop.json \
            | jq -r 'select(.asn != null) | "AS" + (.asn | tostring)' \
            | sort -u)

          if [ -z "$SPAMHAUS_ASNS" ]; then
            echo "Spamhaus fetch returned no ASNs — aborting to avoid emptying the auto-sync block."
            exit 1
          fi

          # Manual entries = ASNs in $known_asns ABOVE the BEGIN marker.
          # Anything below the marker is owned by this workflow and gets replaced.
          # index() (substring) not ~ (regex) so parens in BEGIN_MARKER don't break the match.
          MANUAL_ASNS=$(awk -v begin="$BEGIN_MARKER" '
            index($0, begin) { exit }
            { print }
          ' "$CLASSIFICATION_FILE" | grep -oP "'AS\d+'" | tr -d "'" | sort -u)

          # Auto-sync block content = Spamhaus DROP minus anything classified manually.
          BLOCK_ASNS=$(comm -23 \
            <(echo "$SPAMHAUS_ASNS") \
            <(echo "$MANUAL_ASNS") \
            | sort -t S -k2 -n)

          BLOCK_FILE=$(mktemp)
          {
            echo "    $BEGIN_MARKER"
            echo "    // Synced monthly from https://www.spamhaus.org/drop/asndrop.json by"
            echo "    // .github/workflows/sync-spamhaus.yml. To override an entry's classification,"
            echo "    // move it OUT of this block into the appropriate manual section above."
            echo "    // Last sync: $(date -u +%Y-%m-%d)"
            while IFS= read -r asn; do
              [ -n "$asn" ] && echo "    '$asn' => 'scanning',"
            done <<< "$BLOCK_ASNS"
            echo "    $END_MARKER"
          } > "$BLOCK_FILE"

          # Replace everything between (and including) the BEGIN/END markers with the new block.
          # Python so we can use a non-greedy DOTALL regex without sed-portability headaches.
          python3 - "$CLASSIFICATION_FILE" "$BLOCK_FILE" <<'PY'
          import re, sys
          fp, block_fp = sys.argv[1], sys.argv[2]
          src = open(fp).read()
          new_block = open(block_fp).read().rstrip("\n")
          pattern = re.compile(
              r"[ \t]*// --- BEGIN AUTO-SYNC SPAMHAUS ASN-DROP \(do not hand-edit\) ---.*?// --- END AUTO-SYNC SPAMHAUS ASN-DROP ---",
              re.DOTALL,
          )
          if not pattern.search(src):
              sys.stderr.write("ERROR: BEGIN/END markers not found in " + fp + "\n")
              sys.exit(2)
          open(fp, "w").write(pattern.sub(new_block, src))
          PY
          rm -f "$BLOCK_FILE"

          # Validate PHP still parses before pushing.
          php -l "$CLASSIFICATION_FILE"

          if git diff --quiet "$CLASSIFICATION_FILE"; then
            echo "Spamhaus auto-sync: no changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ADDED=$(git diff "$CLASSIFICATION_FILE" | grep -cE "^\+ +'AS[0-9]+'" || true)
          REMOVED=$(git diff "$CLASSIFICATION_FILE" | grep -cE "^- +'AS[0-9]+'" || true)
          echo "Spamhaus auto-sync: +${ADDED} / -${REMOVED}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CLASSIFICATION_FILE"
          git commit -m "chore: sync Spamhaus ASN-DROP — +${ADDED} / -${REMOVED} ($(date -u +%Y-%m-%d))"
          git push origin develop
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN-driven pushes don't trigger the CI/CD workflow (GitHub
      # loop-prevention), so the monthly sync would land on develop but staging
      # would never auto-deploy. Mirror deploy.yml's deploy-staging here so the
      # sync step is self-contained.
      - name: Deploy to staging (only if Spamhaus diff produced a commit)
        if: steps.regen.outputs.changed == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.STAGING_PATH }}
            git fetch origin && git reset --hard origin/develop
            ~/bin/composer install --no-dev --no-interaction --quiet
            printf "User-agent: *\nDisallow: /\n" > robots.txt

      # Auto-promote develop -> main, but only when the entire delta is inside
      # the Spamhaus auto-sync block. If anything else is unreleased on develop
      # (manual classification edits, code, docs), bail and let a regular release
      # PR ship it instead. Runs unconditionally so a previously-stranded sync
      # commit (e.g. one made before this auto-promote step existed) catches up
      # on the next run, even when the current run produced no new diff.
      - name: Auto-promote develop -> main if delta is pure-Spamhaus
        id: promote
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main develop

          if [ "$(git rev-parse origin/develop)" = "$(git rev-parse origin/main)" ]; then
            echo "develop is already at main; nothing to promote."
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OTHER_FILES=$(git diff origin/main..origin/develop --name-only \
            | grep -v '^asn_classification.php$' || true)
          if [ -n "$OTHER_FILES" ]; then
            echo "develop has unreleased non-Spamhaus changes; not auto-promoting:"
            echo "$OTHER_FILES"
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Strip the entire auto-sync block (including the Last-sync date comment)
          # from both versions; if the rest of the file is identical, the delta is
          # pure Spamhaus and safe to auto-promote.
          strip_block() {
            awk '/BEGIN AUTO-SYNC SPAMHAUS ASN-DROP/{f=1; next} /END AUTO-SYNC SPAMHAUS ASN-DROP/{f=0; next} !f'
          }
          MAIN_STRIPPED=$(git show origin/main:asn_classification.php | strip_block)
          DEV_STRIPPED=$(git show origin/develop:asn_classification.php | strip_block)
          if [ "$MAIN_STRIPPED" != "$DEV_STRIPPED" ]; then
            echo "asn_classification.php has changes outside the auto-sync block; not auto-promoting."
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Pure-Spamhaus delta detected. Opening PR develop -> main."

          DATE=$(date -u +%Y-%m-%d)
          # Reuse an existing open PR if one was opened by a prior run that couldn't
          # auto-merge (e.g. branch protection blocked the bot).
          PR_NUMBER=$(gh pr list --base main --head develop --state open \
            --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_URL=$(gh pr create \
              --base main --head develop \
              --title "chore(spamhaus): promote ${DATE} ASN-DROP sync to main" \
              --body $'Automated promotion: develop\'s only delta vs main is the auto-sync Spamhaus block.\n\nThe footer\'s "Data: <month>" field tracks data freshness, so no version bump.')
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Opened PR #${PR_NUMBER}: ${PR_URL}"
          else
            echo "Reusing existing PR #${PR_NUMBER}."
          fi

          if gh pr merge "$PR_NUMBER" --squash; then
            echo "Merged PR #${PR_NUMBER}."
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-merge failed (likely branch protection). PR #${PR_NUMBER} left open for manual review."
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to production after auto-promote
        if: steps.promote.outputs.promoted == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin && git reset --hard origin/main
            ~/bin/composer install --no-dev --no-interaction --quiet

      - name: Smoke test production after auto-promote
        if: steps.promote.outputs.promoted == 'true'
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Host: ip2geo.org" \
            "http://${{ secrets.DEPLOY_HOST }}")
          if [ "$STATUS" != "200" ]; then
            echo "Production smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Production smoke test passed"
